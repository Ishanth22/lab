<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Expense Splitter</title>
    <script src="expense.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        .container {
            width: 320px;
            background: #fff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        .header {
            padding: 15px;
            background: #ffe6e6;
        }

        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #ff4d6d;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .section {
            padding: 15px;
        }

        h3 {
            color: #007bff;
        }

        .divider {
            height: 8px;
            background: #ff4d6d;
        }

        p {
            margin: 5px 0;
        }
    </style>
</head>

<body>

<div class="container">

    
    <div class="header">
        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter name">

        <label>Expense:</label>
        <input type="number" id="expense" placeholder="Enter expense">

        <button onclick="addExpense()">Add Expense</button>
    </div>

    <div class="divider"></div>

   
    <div class="section">
        <h3>Expenses:</h3>
        <div id="expenseList"></div>
    </div>

    <div class="divider"></div>


    <div class="section">
        <h3>Expense Summary:</h3>
        <div id="summary"></div>
    </div>

</div>



</body>
</html>
